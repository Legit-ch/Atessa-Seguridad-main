<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Formulario Atessa Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px 0;
        }
        .form-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #007bff;
            font-weight: 600;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .alert {
            display: none;
            margin-top: 20px;
        }
        .btn-primary {
            background: linear-gradient(45deg, #007bff, #0056b3);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,123,255,0.4);
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="text-center mb-4">
                <h2 class="text-primary">Atessa Technologies</h2>
                <p class="text-muted">Formulario de Prueba - Cotización Rápida</p>
            </div>

            <form id="testForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <input type="text" class="form-control" name="name" placeholder="Nombre completo" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <input type="email" class="form-control" name="email" placeholder="Email" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <input type="tel" class="form-control" name="phone" placeholder="Teléfono" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <select class="form-control" name="service" required>
                            <option value="">Seleccionar Servicio</option>
                            <option value="Cámaras de Seguridad">Cámaras de Seguridad</option>
                            <option value="Alarmas">Sistemas de Alarma</option>
                            <option value="Control de Acceso">Control de Acceso</option>
                            <option value="Monitoreo 24/7">Monitoreo 24/7</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <textarea class="form-control" name="message" rows="4" 
                        placeholder="Describa sus necesidades de seguridad (opcional)"></textarea>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div>Procesando su solicitud...</div>
                    <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="cancelSubmit()">
                        Cancelar
                    </button>
                </div>

                <div class="alert alert-success" id="successAlert">
                    <strong>¡Éxito!</strong> Su solicitud ha sido enviada correctamente.
                </div>

                <div class="alert alert-danger" id="errorAlert">
                    <strong>Error:</strong> <span id="errorMessage"></span>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                        Enviar Solicitud
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">
                    <strong>Contacto Directo:</strong><br>
                    📞 +504 2239-4200 | 📧 info@atessatechnologies.com
                </small>
            </div>
        </div>
    </div>

    <script>
        let submitTimeout;
        
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Limpiar alertas previas
            document.getElementById('successAlert').style.display = 'none';
            document.getElementById('errorAlert').style.display = 'none';
            
            // Validar formulario
            if (!validateForm()) {
                return;
            }
            
            // Mostrar loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;
            
            // Simular envío (funciona sin servidor)
            submitTimeout = setTimeout(() => {
                // Simular éxito
                document.getElementById('loading').style.display = 'none';
                document.getElementById('successAlert').style.display = 'block';
                document.getElementById('submitBtn').disabled = false;
                
                // Resetear formulario
                this.reset();
                
                // Scroll hacia arriba
                document.querySelector('.form-container').scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
                
                // Auto-ocultar después de 5 segundos
                setTimeout(() => {
                    document.getElementById('successAlert').style.display = 'none';
                }, 5000);
                
            }, 2000); // 2 segundos de simulación
        });
        
        function cancelSubmit() {
            clearTimeout(submitTimeout);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
            showError('Envío cancelado. Puede intentar nuevamente.');
        }
        
        function validateForm() {
            const form = document.getElementById('testForm');
            const requiredFields = form.querySelectorAll('[required]');
            let isValid = true;
            
            requiredFields.forEach(field => {
                field.classList.remove('is-invalid');
                
                if (!field.value.trim()) {
                    field.classList.add('is-invalid');
                    isValid = false;
                }
                
                // Validar email
                if (field.type === 'email' && field.value) {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(field.value)) {
                        field.classList.add('is-invalid');
                        isValid = false;
                    }
                }
            });
            
            if (!isValid) {
                showError('Por favor complete todos los campos requeridos correctamente.');
            }
            
            return isValid;
        }
        
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorAlert').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('errorAlert').style.display = 'none';
            }, 5000);
        }
        
        // Validación en tiempo real
        document.addEventListener('input', function(e) {
            if (e.target.matches('[required]')) {
                if (e.target.value.trim()) {
                    e.target.classList.remove('is-invalid');
                }
            }
        });
    </script>

    <style>
        .is-invalid {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25) !important;
        }
    </style>
</body>
</html>
